<div id="adminStore">
    <div class="page-header">
        <h1><i class="fa-solid fa-store"></i> Loja & Recompensas</h1>
        <p>Gerencie o catálogo de prêmios e os pedidos de resgate.</p>
    </div>

    <div class="internal-tabs-nav" style="margin-bottom: 20px;">
        <button class="tab-btn active" onclick="openStoreTab('tabCatalogo', this)">Catálogo de Prêmios</button>
        <button class="tab-btn" onclick="openStoreTab('tabResgates', this)">Pedidos de Resgate</button>
    </div>

    <div id="tabCatalogo" class="store-section" style="display: block;">
        <div class="form-grid">
            <div class="card" style="margin-bottom: 0;">
                <h3><i class="fa-solid fa-plus-circle"></i> Adicionar Prêmio</h3>
                <form id="adminNewRewardForm" style="margin-top: 15px;">
                    <div class="form-group">
                        <label>Nome do Prêmio</label>
                        <input type="text" id="rewardName" placeholder="Ex: iFood R$ 50,00" required>
                    </div>
                    <div class="form-group">
                        <label>Preço em GoCoins</label>
                        <input type="number" id="rewardPrice" placeholder="Ex: 500" required min="1">
                    </div>
                    <div class="form-group full-width">
                        <label>Descrição</label>
                        <textarea id="rewardDesc" rows="2" placeholder="Ex: Cartão presente digital do iFood..."></textarea>
                    </div>
                    <button type="submit" class="btn btn-primary"><i class="fa-solid fa-floppy-disk"></i> Cadastrar Prêmio</button>
                </form>
            </div>

            <div class="card" style="margin-bottom: 0;">
                <h3><i class="fa-solid fa-tags"></i> Prêmios Disponíveis</h3>
                <div id="adminRewardsList" style="margin-top: 15px; display: flex; flex-direction: column; gap: 10px; max-height: 400px; overflow-y: auto;">
                    <div style="text-align:center; padding:20px; opacity:0.6;"><i class="fa-solid fa-spinner fa-spin"></i> Carregando...</div>
                </div>
            </div>
        </div>
    </div>

    <div id="tabResgates" class="store-section" style="display: none;">
        <div class="card">
            <h3><i class="fa-solid fa-bell-concierge"></i> Pedidos Pendentes de Funcionários</h3>
            <div id="adminRedemptionList" style="margin-top: 15px;">
                <div style="text-align:center; padding:20px; opacity:0.6;"><i class="fa-solid fa-spinner fa-spin"></i> Carregando...</div>
            </div>
        </div>
    </div>
</div>
