<div id="employeeDashboard">
  <div class="page-header">
    <h1 id="employeeGreeting"></h1>
    <p id="currentDate"></p>
  </div>

  <div class="card" style="margin-bottom: 24px; background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%); color: white; display: flex; align-items: center; justify-content: space-between; gap: 20px; flex-wrap: wrap;">
    <div style="flex: 1; min-width: 200px;">
        <h3 style="color: white; border: none; padding: 0; margin-bottom: 10px; font-size: 18px;">
            <i class="fa-solid fa-medal" style="color: #fbbf24;"></i> Nível <span id="userLevelDisplay">1</span>: <span id="userTitleDisplay" style="opacity: 0.8; font-weight: normal; font-size: 14px;">Iniciante</span>
        </h3>
        <div style="background: rgba(255,255,255,0.1); border-radius: 20px; height: 12px; width: 100%; position: relative; overflow: hidden;">
            <div id="xpProgressBar" style="background: var(--color-primary); height: 100%; width: 0%; transition: width 1s ease-in-out; border-radius: 20px; box-shadow: 0 0 10px var(--color-primary);"></div>
        </div>
        <p style="font-size: 12px; margin-top: 8px; opacity: 0.8;">
            <span id="currentXpDisplay">0</span> / <span id="nextLevelXpDisplay">500</span> XP para o próximo nível
        </p>
    </div>
    
    <div style="background: rgba(16, 185, 129, 0.15); border: 1px solid rgba(16, 185, 129, 0.4); padding: 15px 25px; border-radius: 12px; text-align: center;">
        <p style="font-size: 11px; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 5px; color: var(--color-primary); font-weight: bold;">Saldo Atual</p>
        <h2 style="margin: 0; font-size: 26px; color: white; display: flex; align-items: center; gap: 8px;">
            <i class="fa-solid fa-coins" style="color: #fbbf24;"></i> 
            <span id="goCoinsDisplay">0</span> 
        </h2>
    </div>
  </div>

  <div class="card" style="margin-bottom: 24px; border: 2px solid var(--color-primary); background: rgba(16, 185, 129, 0.03);">
      <div id="rankingFuncContainer"></div>
  </div>

  <script>
      if(typeof window.atualizarPainelGamificacao === 'function') window.atualizarPainelGamificacao();
      setTimeout(() => { if(typeof renderRankingMensal === 'function') renderRankingMensal('rankingFuncContainer'); }, 500);
  </script>

  <div
    id="employeeAnnouncementCard"
    class="card"
    style="
      display: none;
      background: linear-gradient(
        135deg,
        rgba(59, 130, 246, 0.1) 0%,
        rgba(16, 185, 129, 0.1) 100%
      );
      border-left: 4px solid var(--color-info);
      margin-bottom: 24px;
      padding: 20px;
    "
  >
    <h3
      style="
        margin-bottom: 10px;
        border: none;
        padding: 0;
        color: var(--color-info);
        font-size: 16px;
      "
    >
      <i class="fa-solid fa-bullhorn"></i> Quadro de Avisos
    </h3>
    <p
      id="employeeAnnouncementText"
      style="
        font-size: 14px;
        white-space: pre-wrap;
        margin: 0;
        color: var(--color-text-primary);
        font-weight: 500;
      "
    ></p>
  </div>

  <div class="stats-grid">
    <div class="stat-card">
      <div class="value" id="todayTasksCount">0</div>
      <div class="label">Atividades de Hoje</div>
    </div>
    <div class="stat-card success">
      <div class="value" id="monthTasks">0</div>
      <div class="label">Atividades Deste Mês</div>
    </div>
    <div class="stat-card warning">
      <div class="value" id="totalTasks">0</div>
      <div class="label">Total de Registros</div>
    </div>
  </div>

  <div class="form-grid" style="margin-bottom: 24px">
    <div
      class="card"
      style="
        margin-bottom: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
      "
    >
      <h3 style="width: 100%">
        <i class="fa-solid fa-chart-pie"></i> Meu Desempenho
      </h3>
      <div style="position: relative; height: 260px; width: 100%">
        <canvas id="funcStatusChart"></canvas>
      </div>
    </div>
    <div class="card" style="margin-bottom: 0">
      <h3 style="width: 100%">
        <i class="fa-solid fa-chart-column"></i> Atividades por Categoria
      </h3>
      <div style="position: relative; height: 260px; width: 100%">
        <canvas id="funcCategoryChart"></canvas>
      </div>
    </div>
  </div>

  <div class="card">
    <h3><i class="fa-solid fa-list-check"></i> Minhas Atividades Recentes</h3>
    <div id="employeeRecentTasks"></div>
  </div>
</div>
