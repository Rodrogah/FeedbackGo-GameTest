<div id="employeeHistory">
    <div class="page-header">
        <h1><i class="fa-solid fa-clock-rotate-left"></i> Meu Histórico</h1>
        <p>Visualize todas as atividades registradas</p>
    </div>
    <div class="card">
        <div class="filters">
            <div class="form-group" style="flex: 1 1 100%;">
                <label>Buscar por Título/Descrição</label>
                <input type="text" id="empFilterSearch" placeholder="Digite uma palavra-chave..." onkeyup="if(event.key === 'Enter') applyEmployeeFilters(1)">
            </div>
            <div class="form-group">
                <label>Categoria</label>
                <select id="empFilterCategory"><option value="">Todas as Categorias</option></select>
            </div>
            <div class="form-group">
                <label>Data Inicial</label>
                <input type="date" id="empFilterStart">
            </div>
            <div class="form-group">
                <label>Data Final</label>
                <input type="date" id="empFilterEnd">
            </div>
            <div class="form-group" style="align-self: flex-end;">
                <button onclick="applyEmployeeFilters()" class="btn btn-small btn-secondary"><i class="fa-solid fa-filter"></i> Filtrar</button>
            </div>
        </div>
        <div id="employeeHistoryTable"></div>
    </div>
</div>
