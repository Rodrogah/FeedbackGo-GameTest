<div class="header-content">
    <h1 class="page-title"><i class="fa-solid fa-inbox"></i> Tarefas Recebidas</h1>
</div>

<div class="content-area">
    <div id="listaTarefasFuncionario"></div>
</div>

<div id="modalResponderTarefa" class="modal-overlay hidden" style="z-index: 10000;">
    <div class="modal-content" style="max-width: 600px;">
        <div class="modal-header">
            <h2><i class="fa-solid fa-reply"></i> Responder Tarefa</h2>
            <button class="close-modal" onclick="fecharModalTarefa()">&times;</button>
        </div>

        <div id="boxFeedbackAdmin" style="display: none; background: #fee2e2; color: #991b1b; padding: 15px; border-radius: 8px; margin-bottom: 15px; border: 1px solid #fecaca;">
            <strong><i class="fa-solid fa-triangle-exclamation"></i> O que precisa ser corrigido:</strong>
            <p id="textoFeedbackAdmin" style="margin: 5px 0 0 0; font-size: 14px; white-space: pre-wrap;"></p>
            <div id="anexosFeedbackAdmin" style="margin-top: 10px; display: flex; gap: 10px; flex-wrap: wrap;"></div>
        </div>

        <h2 id="modalTarefaTitulo" style="margin-bottom: 10px; font-size: 18px;"></h2>
        <p style="font-size: 13px; color: var(--color-text-secondary); margin-bottom: 15px;"><strong>De:</strong> <span id="modalTarefaRemetente" style="color: var(--color-primary);"></span></p>
        
        <div style="background: var(--color-bg-secondary); padding: 15px; border-radius: 8px; margin: 15px 0; border: 1px solid var(--color-border);">
            <p id="modalTarefaDescricao" style="white-space: pre-wrap; font-size: 14px; margin: 0;"></p>
        </div>

        <div id="modalTarefaAnexosAdmin" style="margin-bottom: 20px;"></div>

        <hr style="border-color: var(--color-border); margin: 20px 0;">

        <h3>Sua Entrega</h3>
        <form id="formEntregarTarefa">
            <input type="hidden" id="entregarTarefaId">
            
            <div class="form-group" style="margin-top: 15px;">
                <label>Título Final para o Relatório</label>
                <input type="text" id="entregarTitulo" class="form-control" required placeholder="Ex: Planilha Finalizada">
            </div>

            <div class="form-group">
                <label>Observações da Entrega (Opcional)</label>
                <textarea id="entregarObservacoes" class="form-control" rows="3" placeholder="Descreva o que foi feito ou responda ao Admin..."></textarea>
            </div>

            <div class="form-group">
                <label>Seus Arquivos de Resposta (Opcional - Máx: 3)</label>
                <div class="file-drop-area">
                    <span class="fake-btn">Escolher arquivos</span>
                    <span class="file-msg">ou arraste e solte aqui</span>
                    <input type="file" id="entregarArquivos" multiple class="file-input">
                </div>
                <div id="entregarArquivosLista" style="margin-top: 10px;"></div>
            </div>

            <div style="display: flex; gap: 10px; justify-content: flex-end; margin-top: 20px;">
                <button type="button" class="btn btn-secondary btn-small" onclick="fecharModalTarefa()">Cancelar</button>
                <button type="submit" class="btn btn-primary btn-small"><i class="fa-solid fa-paper-plane"></i> Enviar para Revisão</button>
            </div>
        </form>
    </div>
</div>
