<div id="adminAllActivities">
    <div class="page-header">
        <h1><i class="fa-solid fa-list"></i> Histórico</h1>
    </div>
    <div class="card">
        <div class="filters">
            <div class="form-group" style="flex: 1 1 100%;">
                <label>Buscar por Título/Descrição</label>
                <div style="display: flex; gap: 10px;">
                    <input type="text" id="admFilterSearch" placeholder="Digite uma palavra-chave..." onkeyup="if(event.key === 'Enter') applyAdminFilters(1)" style="flex: 1;">
                </div>
            </div>
            
            <div class="form-group">
                <label>Equipe</label>
                <select id="admFilterTeam"><option value="">Todas as Equipes</option></select>
            </div>
            <div class="form-group">
                <label>Funcionário</label>
                <select id="adminFilterUser"><option value="">Todos os Colaboradores</option></select>
            </div>
            <div class="form-group">
                <label>Categoria</label>
                <select id="admFilterCategory"><option value="">Todas as Categorias</option></select>
            </div>
            <div class="form-group">
                <label>Data Inicial</label>
                <input type="date" id="adminFilterStartDate">
            </div>
            <div class="form-group">
                <label>Ordem:</label>
                <select id="ordemHistorico" class="form-control" style="cursor: pointer;" onchange="applyAdminFilters(1)">
                    <option value="desc">Mais Novos Primeiro</option>
                    <option value="asc">Mais Antigos Primeiro</option>
                </select>
            </div>
            <div style="display: flex; gap: 10px; align-items: flex-end;">
                <button type="button" onclick="applyAdminFilters(1)" class="btn btn-primary"><i class="fa-solid fa-filter"></i> Pesquisar</button>
            </div>
        </div>
        <div id="adminActivitiesTable"></div>
    </div>
</div>
